<svg width="820" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
      .bg { fill: transparent; }
      .container { transform: translateY(20px); }
      
      .blog-group { cursor: pointer; }
      .blog-bg { 
        fill: #1e293b; 
        rx: 8; 
        transition: all 0.3s ease; 
        opacity: 0.7;
      }
      .blog-text {
        font-family: 'Fira Code', monospace;
        font-size: 16px;
        fill: #94a3b8;
        transition: all 0.3s ease;
      }
      .blog-date {
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        fill: #64748b;
        text-anchor: end;
        transition: all 0.3s ease;
      }
      
      /* Hover Effects */
      .blog-group:hover .blog-bg {
        fill: #3b82f6;
        opacity: 0.2;
        transform: scale(1.02) translateX(-8px);
      }
      .blog-group:hover .blog-text {
        fill: #60a5fa;
        font-weight: 700;
        transform: translateX(10px);
      }
      .blog-group:hover .blog-date {
        fill: #93c5fd;
        transform: translateX(-10px);
      }
      
      /* Staggered Entrance Animation */
      .blog-group { animation: slideIn 0.5s ease-out forwards; opacity: 0; }
      .delay-0 { animation-delay: 0.1s; }
      .delay-1 { animation-delay: 0.2s; }
      .delay-2 { animation-delay: 0.3s; }
      .delay-3 { animation-delay: 0.4s; }
      
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
    </style>
  </defs>
  <rect width="820" height="240" class="bg" />
  <g class="container">
    <g class="blog-group delay-0">
      <rect x="20" y="0" width="780" height="40" class="blog-bg" />
      <text x="40" y="26" class="blog-text">🚀 深度强化学习（DRL）算法 2 —— PPO 之 GRPO 篇</text>
      <text x="780" y="25" class="blog-date">2024-03</text>
    </g>
    <g class="blog-group delay-1">
      <rect x="20" y="50" width="780" height="40" class="blog-bg" />
      <text x="40" y="76" class="blog-text">🚀 AI Infra 01 - Paged Attention：大语言模型推理的内存优化利器</text>
      <text x="780" y="75" class="blog-date">2024-02</text>
    </g>
    <g class="blog-group delay-2">
      <rect x="20" y="100" width="780" height="40" class="blog-bg" />
      <text x="40" y="126" class="blog-text">🚀 使用 vLLM Production Stack 快速在单卡上部署多个 Embedding...</text>
      <text x="780" y="125" class="blog-date">2024-01</text>
    </g>
    <g class="blog-group delay-3">
      <rect x="20" y="150" width="780" height="40" class="blog-bg" />
      <text x="40" y="176" class="blog-text">🚀 cleanvllm: 从 0 到 1 构建一个 vLLM</text>
      <text x="780" y="175" class="blog-date">2023-12</text>
    </g>
  </g>
</svg>